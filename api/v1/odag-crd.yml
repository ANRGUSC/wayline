apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: odags.wl.io
spec:
  group: wl.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [tasks]
              properties:
                scheduler:
                  type: string
                  default: random
                  description: >
                    Scheduler to use. Built-ins: random.
                    Or a path to a user-defined Python script mounted via ConfigMap.
                retryPolicy:
                  type: object
                  properties:
                    maxRetries:
                      type: integer
                      default: 3
                      minimum: 0
                tasks:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [name, image]
                    properties:
                      name:
                        type: string
                      image:
                        type: string
                      command:
                        type: array
                        items:
                          type: string
                      args:
                        type: array
                        items:
                          type: string
                      dependencies:
                        type: array
                        items:
                          type: string
                        default: []
                      resources:
                        type: object
                        properties:
                          cpu:
                            type: string
                          memory:
                            type: string
                      dataSize:
                        type: string
                        description: Expected output data size, e.g. "100MB". Used by scheduler for communication cost estimation.
                      runtime:
                        type: integer
                        description: Expected runtime in seconds. Used by scheduler for makespan estimation.
                      env:
                        type: array
                        items:
                          type: object
                          required: [name]
                          properties:
                            name:
                              type: string
                            value:
                              type: string
                      constraints:
                        type: object
                        properties:
                          nodeNames:
                            type: array
                            items:
                              type: string
                            description: If set, scheduler will only place this task on one of these nodes.
                      volumes:
                        type: array
                        description: >
                          Pod-level volumes appended to the controller's base mounts
                          (wl-outputs, wl-shared). Each item is a standard K8s
                          corev1.Volume. Reserved names ("wl-outputs", "wl-shared")
                          are rejected at parse time.
                        items:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                      volumeMounts:
                        type: array
                        description: >
                          Container-level volume mounts appended to the controller's
                          base mounts. Each item is a standard K8s corev1.VolumeMount.
                          Names must match a declared volume (either user-defined or
                          controller-owned).
                        items:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                      securityContext:
                        type: object
                        description: >
                          Pod-level securityContext (supplementalGroups, runAsUser,
                          fsGroup, etc.). Applied verbatim as corev1.PodSecurityContext.
                        x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Scheduling, Running, Succeeded, Failed, Degraded]
                tasks:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      phase:
                        type: string
                        enum: [Pending, Running, Succeeded, Failed]
                      state:
                        type: string
                        description: Granular task state reported by data-agent (Scheduled/Executing/Sending/DataReady/Done/Failed).
                      node:
                        type: string
                      podName:
                        type: string
                      startTime:
                        type: string
                        format: date-time
                      completionTime:
                        type: string
                        format: date-time
                      retries:
                        type: integer
                      message:
                        type: string
                      sending:
                        type: boolean
                        description: True while the background data transfer thread is active.
                      dataSize:
                        type: string
                        description: Output data size in bytes (parsed from spec.tasks[].dataSize).
                startTime:
                  type: string
                  format: date-time
                completionTime:
                  type: string
                  format: date-time
                makespan:
                  type: number
                  description: Actual makespan in seconds (set on completion).
                message:
                  type: string
                predictedTasks:
                  type: array
                  description: Per-task predicted schedule computed at deployment time.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      node:
                        type: string
                      estStart:
                        type: number
                        description: Estimated start time in seconds from t=0.
                      estEnd:
                        type: number
                        description: Estimated finish time in seconds from t=0.
                predictedNetworkFlows:
                  type: array
                  description: Per-edge predicted network transfers under TCP fair-sharing contention.
                  items:
                    type: object
                    properties:
                      fromTask:
                        type: string
                      toTask:
                        type: string
                      srcNode:
                        type: string
                      dstNode:
                        type: string
                      start:
                        type: number
                        description: Transfer start time in seconds from t=0.
                      end:
                        type: number
                        description: Transfer end time in seconds from t=0.
                      dataSize:
                        type: integer
                        description: Bytes transferred.
                        format: int64
                actualNetworkFlows:
                  type: array
                  description: Per-push observed network transfers recorded by the sender's data-agent.
                  items:
                    type: object
                    properties:
                      fromTask:
                        type: string
                      toTask:
                        type: string
                      srcNode:
                        type: string
                      dstNode:
                        type: string
                      start:
                        type: number
                        description: Observed wire start, seconds from ODAG startTime.
                      end:
                        type: number
                        description: Observed wire end, seconds from ODAG startTime.
                      dataSize:
                        type: integer
                        format: int64
                      ok:
                        type: boolean
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Scheduler
          type: string
          jsonPath: .spec.scheduler
        - name: Makespan
          type: number
          jsonPath: .status.makespan
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: odags
    singular: odag
    kind: ODAG
    shortNames:
      - odag
