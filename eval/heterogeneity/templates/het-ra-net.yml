    warmupRuns: 0
    minSamples: 2
    emaAlpha: 0.4
    maxSamples: 100
    runtimeSource: profiler
    bandwidthSource: external
  defaults:
    runtime: 3
    dataSize: "0"
  retention:
    maxRuns: 80
    data:
      policy: keepLatest
      keepRuns: 2
      maxSizePerNode: "2Gi"
